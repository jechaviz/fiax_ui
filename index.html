<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fiax - Facturación Inteligente</title>
  <meta name="description" content="Fiax — Plataforma de facturación electrónica CFDI 4.0 inteligente para Personas Físicas y Morales." />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #app { height: 100%; min-height: 100vh; }
    body { font-family: 'Manrope', system-ui, sans-serif; }

    /* Splash screen */
    .splash {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #050c1a; z-index: 10000;
      transition: opacity 0.5s ease;
    }
    .splash.hidden { opacity: 0; pointer-events: none; }
    .splash-logo { font-size: 3rem; font-weight: 900; color: #fff; margin-bottom: 1rem; font-style: italic; letter-spacing: -0.04em; }
    .splash-sub  { font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 2rem; }
    .splash-loader { width: 36px; height: 36px; border: 2px solid rgba(255,255,255,0.08); border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>
  <div id="splash" class="splash">
    <div class="splash-logo">FIAX</div>
    <div class="splash-sub">Facturación Inteligente</div>
    <div class="splash-loader"></div>
  </div>
  <div id="app"></div>

  <script>
    // CDN dependencies are loaded inline to control order
    const FIAX = window.fiax || (window.fiax = {});

    // Global Error Display
    window.addEventListener('error', (e) => {
      if (e.message?.includes('ResizeObserver')) return; // ignore benign
      const box = document.createElement('div');
      box.style = "position:fixed;bottom:20px;right:20px;z-index:99999;background:#ef4444;color:#fff;padding:12px 16px;border-radius:10px;font-family:monospace;max-width:440px;word-wrap:break-word;font-size:12px;";
      box.innerHTML = `<b>Error:</b> ${e.message}<br><small>${e.filename}:${e.lineno}</small>`;
      document.body.appendChild(box);
      setTimeout(() => box.remove(), 8000);
    });
    window.addEventListener('unhandledrejection', (e) => {
      const box = document.createElement('div');
      box.style = "position:fixed;bottom:20px;right:20px;z-index:99999;background:#f59e0b;color:#fff;padding:12px 16px;border-radius:10px;font-family:monospace;max-width:440px;word-wrap:break-word;font-size:12px;";
      box.innerHTML = `<b>Promise Error:</b> ${e.reason?.message || e.reason}`;
      document.body.appendChild(box);
      setTimeout(() => box.remove(), 8000);
    });
  </script>

  <!-- CDN: Vue 3, Vue Router, SFC Loader, YAML -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
  <script src="https://unpkg.com/vue3-sfc-loader/dist/vue3-sfc-loader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

  <script type="module">
    const { createApp, defineAsyncComponent, onMounted } = Vue;
    const { createRouter, createWebHashHistory } = VueRouter;

    const FIAX = window.fiax || (window.fiax = {});

    // ── CSS stylesheet injection ─────────────────────────────────
    const cssParts = [
      "css/00_core.css",
      "css/20_shell_layout.css",
      "css/21_sidebar.css",
      "css/22_topbar_profile.css",
      "css/23_breadcrumbs.css",
      "css/24_pane_header.css",
      "css/25_kpis.css",
      "css/27_datatable_shell.css",
      "css/28_overlays_popups.css",
      "css/30_forms.css",
      "css/31_shell_cards.css",
      "css/34_command_palette.css",
      "css/38_shell_dashboard.css",
    ];

    cssParts.forEach((path) => {
      const link = document.createElement("link");
      link.rel = "stylesheet";
      link.href = `/${path}`;
      document.head.appendChild(link);
    });

    // ── Script loader ────────────────────────────────────────────
    async function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src;
        s.async = false;
        s.onload = resolve;
        s.onerror = () => reject(new Error(`Failed to load: ${src}`));
        document.head.appendChild(s);
      });
    }

    // ── Bootstrap ─────────────────────────────────────────────────
    async function init() {
      // Configure UnoCSS BEFORE loading the runtime script
      window.__unocss = {
        presets: [
          () => window.unocss.presetWind(),
          () => window.unocss.presetAttributify(),
        ],
        theme: {
          colors: {
            brand: { active: '#3b82f6', surface: '#0a1224' }
          }
        },
        config: { dark: 'class', darkSelector: '[data-theme="dark"]' }
      };
      
      // Load UnoCSS for Tailwind utility classes used in inner components
      await loadScript("https://cdn.jsdelivr.net/npm/@unocss/runtime");

      // Load data & logic scripts in correct dependency order
      await loadScript("/js/fiax_demo_data.js");
      await loadScript("/js/fiax_config.js");
      await loadScript("/js/fiax_constants.js");
      await loadScript("/js/fiax_i18n.js");
      await loadScript("/js/fiax_state.js");
      await loadScript("/js/fiax_datatable_schema.js");
      await loadScript("/js/fiax_datatable_filters.js");
      await loadScript("/js/fiax_datatable_views.js");
      await loadScript("/js/fiax_logic_cfdi.js");
      await loadScript("/js/fiax_ai.js");

      // ── SFC Loader options ───────────────────────────────────────
      const options = {
        moduleCache: { vue: Vue },
        async getFile(url) {
          let finalUrl = url;
          // app/ shorthand → /components/app/...
          if (finalUrl.startsWith('app/')) {
            finalUrl = '/components/' + finalUrl;
          }
          // Relative paths: ./Sidebar.vue → /Sidebar.vue
          if (finalUrl.startsWith('./')) {
            finalUrl = finalUrl.slice(1);
          }
          const res = await fetch(finalUrl, { cache: 'no-store' });
          if (!res.ok) throw new Error(`[Fiax] 404: ${url} (resolved: ${finalUrl})`);
          return res.text();
        },
        addStyle(textContent) {
          const style = document.createElement("style");
          style.textContent = textContent;
          document.head.appendChild(style);
        },
      };

      const { loadModule } = window["vue3-sfc-loader"];

      // Expose globally for nested async component loading
      FIAX.loadModule = loadModule;
      FIAX.loaderOptions = options;

      // ── Global component registration ────────────────────────────
      const UI = {
        AppButton:  defineAsyncComponent(() => loadModule('/components/ui/Button.vue', options)),
        DataTable:  defineAsyncComponent(() => loadModule('/components/app/datatable/DataTable.vue', options)),
        AppInput:   defineAsyncComponent(() => loadModule('/components/ui/Input.vue', options)),
        AppBadge:   defineAsyncComponent(() => loadModule('/components/ui/Badge.vue', options)),
        AppCard:    defineAsyncComponent(() => loadModule('/components/ui/Card.vue', options)),
      };

      // ── Router ───────────────────────────────────────────────────
      const lm = (path, opts) => () => loadModule(path, opts || options);

      const routes = [
        { path: '/', alias: ['/index.html', '/dashboard'], component: lm('/features/Dashboard.vue') },

        // Comprobantes fiscales
        { path: '/cfdi/ingresos',     component: lm('/features/InvoicesList.vue'),  props: { type: 'I' } },
        { path: '/cfdi/egresos',      component: lm('/features/InvoicesList.vue'),  props: { type: 'E' } },
        { path: '/cfdi/traslado',     component: lm('/features/InvoicesList.vue'),  props: { type: 'T' } },
        { path: '/cfdi/pagos',        component: lm('/features/PaymentsList.vue') },
        { path: '/cfdi/nomina',       component: lm('/features/PayrollList.vue') },
        { path: '/cfdi/ingresos/new', component: lm('/features/InvoiceForm.vue') },
        { path: '/cfdi/ingresos/:id', component: lm('/features/InvoiceDetail.vue'), props: { type: 'I' } },
        { path: '/cfdi/egresos/:id',  component: lm('/features/InvoiceDetail.vue'), props: { type: 'E' } },
        { path: '/cfdi/traslado/:id', component: lm('/features/InvoiceDetail.vue'), props: { type: 'T' } },
        { path: '/cfdi/pagos/:id',    component: lm('/features/PaymentDetail.vue') },
        { path: '/cfdi/nomina/:id',   component: lm('/features/PayrollDetail.vue') },

        // Catálogos
        { path: '/clients',           component: lm('/features/ClientsList.vue') },
        { path: '/products',          component: lm('/features/ProductsList.vue') },
        { path: '/employees',         component: lm('/features/Placeholder.vue') },

        // CRM / Ventas
        { path: '/leads',             component: lm('/features/LeadsList.vue') },
        { path: '/leads/:id',         component: lm('/features/Placeholder.vue') },
        { path: '/estimates',         component: lm('/features/EstimatesList.vue') },
        { path: '/estimates/:id',     component: lm('/features/Placeholder.vue') },
        { path: '/contracts',         component: lm('/features/ContractsList.vue') },
        { path: '/contracts/:id',     component: lm('/features/Placeholder.vue') },

        // Operaciones
        { path: '/projects',          component: lm('/features/ProjectsList.vue') },
        { path: '/projects/:id',      component: lm('/features/Placeholder.vue') },

        // Finanzas
        { path: '/expenses',          component: lm('/features/ExpensesList.vue') },
        { path: '/transactions',      component: lm('/features/TransactionsList.vue') },
        { path: '/transactions/:id',  component: lm('/features/Placeholder.vue') },

        // Admin
        { path: '/admin/issuers',     component: lm('/features/IssuersList.vue') },
        { path: '/jobs',              component: lm('/features/Placeholder.vue') },
        { path: '/gigs',              component: lm('/features/Placeholder.vue') },
      ];

      const router = createRouter({
        history: createWebHashHistory(),
        routes,
        scrollBehavior: () => ({ top: 0 }),
      });

      FIAX._router = router;

      // ── Root App component ─────────────────────────────────────
      const App = {
        components: {
          Shell: defineAsyncComponent(() => loadModule('/components/Shell.vue', options)),
        },
        setup() {
          const state = FIAX.state.ensureState();
          onMounted(() => {
            document.getElementById('splash')?.classList.add('hidden');
          });
          return { state };
        },
        template: `
          <Shell :state="state">
            <router-view v-slot="{ Component }">
              <transition name="page-fade" mode="out-in">
                <component :is="Component" :state="state" />
              </transition>
            </router-view>
          </Shell>
        `,
      };

      const app = createApp(App);
      Object.entries(UI).forEach(([name, comp]) => app.component(name, comp));
      app.use(router);
      app.mount("#app");
    }

    init().catch(err => {
      console.error('[Fiax] Init error:', err);
      const splash = document.getElementById('splash');
      if (splash) splash.innerHTML = `
        <div style="color:#ef4444;padding:2rem;text-align:center;font-family:monospace;">
          <div style="font-size:2rem;margin-bottom:1rem;">⚠</div>
          <div><b>Error de inicio:</b></div>
          <div style="margin-top:0.5rem;font-size:0.875rem;opacity:0.8;">${err.message}</div>
        </div>`;
    });
  </script>
</body>

</html>
